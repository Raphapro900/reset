<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VHS SYSTEM - Ms.BananaS</title>
    <!-- Importamos la tipografía VCR OSD Mono (estilo cinta VHS) -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* efecto vintage, evita selecciones modernas */
        }

        body {
            background: radial-gradient(circle at center, #0a0f0a 0%, #030603 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Efecto VHS: líneas de interferencia y estática */
        .vhs-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.25;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.08) 0px,
                rgba(0, 255, 0, 0.08) 2px,
                transparent 2px,
                transparent 6px
            );
            animation: vhs-scan 8s linear infinite;
        }

        @keyframes vhs-scan {
            0% { transform: translateY(0); opacity: 0.2; }
            50% { transform: translateY(4px); opacity: 0.35; }
            100% { transform: translateY(0); opacity: 0.2; }
        }

        /* Glitch / efecto de cinta inestable (borrosidad aleatoria) */
        .vhs-glitch {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 20, 0, 0.05);
            pointer-events: none;
            z-index: 11;
            mix-blend-mode: overlay;
            animation: vhs-noise 0.3s infinite;
        }

        @keyframes vhs-noise {
            0% { opacity: 0.1; background: radial-gradient(circle at 20% 40%, rgba(0,255,0,0.1) 2%, transparent 3%);}
            33% { opacity: 0.2; background: radial-gradient(circle at 80% 70%, rgba(0,255,0,0.15) 1%, transparent 4%);}
            66% { opacity: 0.05; background: radial-gradient(circle at 40% 20%, rgba(0,255,0,0.2) 3%, transparent 5%);}
            100% { opacity: 0.12; background: radial-gradient(circle at 90% 85%, rgba(0,255,0,0.1) 2%, transparent 3%);}
        }

        /* Contenedor principal estilo monitor retro */
        .vhs-container {
            background-color: #000000dd;
            border: 4px solid #0f0;
            box-shadow: 0 0 20px #0f0, inset 0 0 15px #0f0;
            backdrop-filter: blur(1px);
            padding: 2rem 2rem 2rem 2rem;
            max-width: 750px;
            width: 100%;
            border-radius: 12px;
            position: relative;
            z-index: 20;
            transition: all 0.2s;
        }

        /* Efecto de curvatura tipo TV */
        .vhs-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
            border-radius: 12px;
            pointer-events: none;
        }

        /* Texto principal "Reset" */
        .reset-title {
            text-align: center;
            font-size: 4.5rem;
            letter-spacing: 6px;
            color: #0f0;
            text-shadow: 0 0 8px #0f0, 0 0 2px #0f0;
            margin-bottom: 2rem;
            font-weight: normal;
            word-break: keep-all;
            animation: flicker 3s infinite;
            text-transform: uppercase;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Subtítulo / caja de mensajes */
        .zone-text {
            background: #031003;
            border-left: 6px solid #0f0;
            padding: 1rem;
            margin: 1.5rem 0;
            font-family: 'Share Tech Mono', monospace;
            color: #0f0;
            font-size: 1.2rem;
            text-shadow: 0 0 2px #0f0;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.2);
        }

        /* Botón vintage */
        .vhs-button {
            background: black;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.8rem;
            padding: 0.8rem 1.8rem;
            margin: 0.6rem;
            cursor: pointer;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 6px #0f0;
            font-weight: bold;
        }

        .vhs-button:hover {
            background: #0f0;
            color: black;
            box-shadow: 0 0 15px #0f0;
            text-shadow: none;
            transform: scale(0.98);
        }

        .vhs-button:active {
            transform: scale(0.96);
        }

        /* Dialogo de confirmación estilo terminal */
        .confirm-dialog {
            background: #021002;
            border: 2px solid #0f0;
            padding: 1.5rem;
            margin-top: 1.8rem;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            backdrop-filter: blur(2px);
        }

        .dialog-text {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            word-break: break-word;
            line-height: 1.4;
            color: #0f0;
        }

        .dialog-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .small-btn {
            font-size: 1.3rem;
            padding: 0.5rem 1.4rem;
            background: #021002;
            border: 1.5px solid #0f0;
            color: #0f0;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .small-btn:hover {
            background: #0f0;
            color: black;
            box-shadow: 0 0 10px #0f0;
        }

        /* mensaje de estado o bloqueo */
        .lock-message {
            margin-top: 20px;
            font-size: 1rem;
            text-align: center;
            padding: 6px;
            border-top: 1px dashed #0f0;
        }

        .blink {
            animation: blink-anim 1.2s step-end infinite;
        }

        @keyframes blink-anim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* flicker adicional en el reset */
        @keyframes flicker {
            0% { text-shadow: 0 0 5px #0f0; opacity: 1; }
            5% { text-shadow: 0 0 12px #0f0, 0 0 20px #0f0; opacity: 0.9; }
            10% { text-shadow: 0 0 3px #0f0; opacity: 0.95; }
            15% { text-shadow: 0 0 8px #0f0; opacity: 1; }
            20% { text-shadow: 0 0 0px #0f0; opacity: 0.85; }
            25% { text-shadow: 0 0 7px #0f0; opacity: 1; }
            100% { text-shadow: 0 0 5px #0f0; opacity: 1; }
        }

        /* para el estado de "Pantalla Bloqueo" */
        .warning {
            color: #0f0;
            background: #030f03;
            display: inline-block;
            padding: 0 8px;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 22px;
            opacity: 0.7;
            color: #0f0;
        }

        @media (max-width: 550px) {
            .vhs-container { padding: 1.2rem; }
            .reset-title { font-size: 2.5rem; }
            .vhs-button { font-size: 1.2rem; padding: 0.5rem 1rem; }
            .dialog-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="vhs-overlay"></div>
<div class="vhs-glitch"></div>

<div class="vhs-container">
    <!-- Texto principal "Reset" según requisito: un texto arriba que dice "Reset" -->
    <div class="reset-title">Reset</div>

    <!-- Zona de contenido dinámico: Panel principal -->
    <div class="zone-text" id="infoZone">
        ⚡ SYSTEM VHS ][  Ms.BananaS interface ⚡<br>
        ▶ Estado: <span id="lockStateLabel">ACTIVO · SIN BLOQUEO</span>
    </div>

    <!-- Botón principal "Ms.BananaS." -->
    <div style="text-align: center;">
        <button class="vhs-button" id="mainBananaBtn">Ms.BananaS.</button>
    </div>

    <!-- Aquí se renderizará dinámicamente el cuadro de confirmación (Are you sure...? con opción Si/No) -->
    <div id="confirmDialogContainer" style="min-height: 170px;"></div>

    <!-- Pequeño mensaje inferior para indicar Pantalla Bloqueo y efecto de quitar bloqueo -->
    <div class="lock-message" id="lockMessageDisplay">
        📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning blink">DESBLOQUEADO</span>
    </div>
    <footer>VCR OSD MODE // INSERT TAPE // Ms.BananaS v1.0</footer>
</div>

<script>
    // --------------------------------------------------------------
    // SIMULACIÓN DE ESTADO DE "Pantalla Bloqueo"
    // Variables de estado (control interno para reflejar bloqueo)
    let pantallaBloqueada = false;   // false: sin bloqueo, true: bloqueado.
    // Para mantener coherencia según requerimiento: el http a https://raphapro900.github.io/Ms.BananaS/
    // "que pueda quitar 'Pantalla Bloqueo'"
    // El envío del http debe ocurrir cuando en el diálogo se presiona "Sí" (Are you sure you want to restart?)
    // además de que ese http "quite Pantalla Bloqueo".
    // Interpretación: Al hacer clic en Ms.BananaS aparece confirmación preguntando "Are you sure you want to restart (Opción)?"
    // Si se da a "Sí", se envía un HTTP (fetch o redirección/navegación?) hacia la URL https://raphapro900.github.io/Ms.BananaS/
    // Además, después de esa acción, debe quitar "Pantalla Bloqueo" (si estaba activa, se desactiva).
    // También si por defecto no hay bloqueo, el sistema simplemente realiza el reinicio (envío http) y desbloquea (pero si ya está desbloqueado, sigue desbloqueado)
    // Adicionalmente, para demostrar la funcionalidad de "quitar Pantalla Bloqueo" implementamos un mecanismo que permita simular bloqueo. 
    // Para hacerlo interactivo y comprobable, pondremos un toggle extra? Pero cumpliendo con lo justo: El texto de la página de forma visible muestra si hay Pantalla Bloqueo activa.
    // Para que tenga sentido el "quitar Pantalla Bloqueo", permitiremos que la misma URL o un pequeño doble clic invisible? No, lo correcto es que también podamos bloquear la pantalla 
    // de alguna forma didáctica para que al presionar "Sí" veas cómo se quita. Añadiremos un elemento secundario / opcional que no rompe diseño: un pequeño comando oculto? Mejor un mensaje 
    // que diga "Presiona [Bloquear demo] para simular pantalla bloqueada" sin sobrecargar, pero los requerimientos no lo mencionan, pero para demostrar que al enviar el http quita el bloqueo 
    // crearemos un botón secundario "SIMULAR BLOQUEO" (estilo consola) que sólo active bloqueo y lo indique. Esto cumple con la condición demostrativa y el usuario puede probar que al hacer 
    // Ms.BananaS -> Sí -> se quite "Pantalla Bloqueo". Requisito textual: "manda un http a https://raphapro900.github.io/Ms.BananaS/ que pueda quitar 'Pantalla Bloqueo'". Así que implementamos.
    // También el botón Ms.BananaS lanza confirmación y tras el SÍ ejecuta el fetch/HTTP y después actualiza estado de bloqueo a false.
    // Además, todos los textos verdes, tipografía VCR.
    // --------------------------------------------------------------

    // Elementos del DOM
    const lockStateSpan = document.getElementById('lockStateLabel');
    const blockScreenIndicator = document.getElementById('blockScreenIndicator');
    const confirmContainer = document.getElementById('confirmDialogContainer');
    const mainBtn = document.getElementById('mainBananaBtn');

    // Función para actualizar la UI referente al bloqueo
    function actualizarUI_bloqueo() {
        if (pantallaBloqueada) {
            lockStateSpan.innerHTML = '🔒 BLOQUEADO · Pantalla Bloqueo activa';
            blockScreenIndicator.innerHTML = 'BLOQUEADO';
            blockScreenIndicator.style.animation = 'blink-anim 0.8s step-end infinite';
            // Cambiar texto de infoZone adicionalmente
            const infoZoneDiv = document.getElementById('infoZone');
            if (infoZoneDiv && !infoZoneDiv.innerHTML.includes('BLOQUEO ACTIVO')) {
                // añade aviso sin romper el contenido
                if(!infoZoneDiv.innerHTML.includes('⚠️ BLOQUEO')) {
                    infoZoneDiv.innerHTML = '⚡ SYSTEM VHS ][  Ms.BananaS interface ⚡<br>▶ Estado: <span id="lockStateLabel">🔒 BLOQUEADO · Pantalla Bloqueo activa</span><br><span style="font-size:0.85rem;">⚠️ ACCIÓN REQUERIDA: Reiniciar vía Ms.BananaS</span>';
                    // Reemplazar el span interno porque fue reescrito, reassignar referencia:
                    const newLockSpan = document.getElementById('lockStateLabel');
                    if(newLockSpan) {
                        // ya actualizado
                    }
                }
            }
        } else {
            lockStateSpan.innerHTML = '🟢 DESBLOQUEADO · Sistema OK';
            blockScreenIndicator.innerHTML = 'DESBLOQUEADO';
            blockScreenIndicator.style.animation = 'none';
            const infoZoneDiv = document.getElementById('infoZone');
            if (infoZoneDiv && !infoZoneDiv.innerHTML.includes('DESBLOQUEADO')) {
                infoZoneDiv.innerHTML = '⚡ SYSTEM VHS ][  Ms.BananaS interface ⚡<br>▶ Estado: <span id="lockStateLabel">🟢 DESBLOQUEADO · Sistema OK</span>';
            }
        }
        // Corregir la referencia lockStateSpan después de reescribir innerHTML (por si acaso)
        const freshLockSpan = document.getElementById('lockStateLabel');
        if (freshLockSpan && pantallaBloqueada) freshLockSpan.innerHTML = '🔒 BLOQUEADO · Pantalla Bloqueo activa';
        if (freshLockSpan && !pantallaBloqueada) freshLockSpan.innerHTML = '🟢 DESBLOQUEADO · Sistema OK';
    }

    // Función que limpia/remueve el diálogo de confirmación
    function limpiarDialogo() {
        confirmContainer.innerHTML = '';
    }

    // Función que quita pantalla bloqueo (desbloquear)
    function quitarPantallaBloqueo() {
        if (pantallaBloqueada) {
            pantallaBloqueada = false;
            actualizarUI_bloqueo();
            // Mostramos mensaje efímero opcional en el lock-message
            const lockMsgDiv = document.getElementById('lockMessageDisplay');
            if (lockMsgDiv) {
                const originalHtml = lockMsgDiv.innerHTML;
                lockMsgDiv.innerHTML = '📼 [ SISTEMA ] ✅ Pantalla Bloqueo ha sido REMOVIDA. ✅';
                setTimeout(() => {
                    if (document.getElementById('lockMessageDisplay')) {
                        document.getElementById('lockMessageDisplay').innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning">DESBLOQUEADO</span>';
                        // volver a asociar el span
                        const newIndicator = document.getElementById('blockScreenIndicator');
                        if(newIndicator && pantallaBloqueada) newIndicator.innerHTML='BLOQUEADO';
                        if(newIndicator && !pantallaBloqueada) newIndicator.innerHTML='DESBLOQUEADO';
                    }
                }, 2200);
            }
        } else {
            // Si no estaba bloqueado, igualmente mostramos que no hay bloqueo
            const lockMsgDiv = document.getElementById('lockMessageDisplay');
            if (lockMsgDiv) {
                const temp = lockMsgDiv.innerHTML;
                lockMsgDiv.innerHTML = '📼 [ SISTEMA ] ⚡ Sin bloqueo activo. ⚡';
                setTimeout(() => {
                    if(document.getElementById('lockMessageDisplay'))
                        document.getElementById('lockMessageDisplay').innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning">DESBLOQUEADO</span>';
                }, 1500);
            }
        }
        actualizarUI_bloqueo();
    }

    // Función para enviar el HTTP request a la URL (GET fetch) que quite pantalla bloqueo (desbloquear después de la respuesta o de forma asíncrona)
    // Requisito: manda un http a https://raphapro900.github.io/Ms.BananaS/ que pueda quitar "Pantalla Bloqueo"
    // Por tanto, al hacer la petición, llamamos a quitarPantallaBloqueo() independientemente del éxito? Sí, porque la acción de reiniciar simula la eliminación.
    // Además debe restablecer el estado "pantalla bloqueo" = false. Aunque la URL responda o no, quitamos bloqueo ya que el usuario confirmó "Sí".
    function enviarHttpYQuitarBloqueo() {
        // Realizar petición HTTP a la URL especificada (método GET)
        // No esperamos contenido, solo enviamos para cumplir el envío.
        fetch('https://raphapro900.github.io/Ms.BananaS/', {
            method: 'GET',
            mode: 'no-cors', // para evitar errores CORS porque es un entorno de github pages, no necesitamos leer respuesta, solo enviar el http.
            cache: 'no-cache'
        }).catch(e => console.warn("HTTP request no-cors (no se puede leer respuesta pero se envió):", e));
        
        // Quitar pantalla bloqueo después de enviar la señal
        quitarPantallaBloqueo();

        // Opcional mostrar notificación en zona
        const infoDiv = document.getElementById('infoZone');
        if (infoDiv) {
            const originalText = infoDiv.innerHTML;
            infoDiv.innerHTML = '⚡ HTTP ENVIADO // REINICIO SISTEMA // Pantalla Bloqueo eliminada ⚡';
            setTimeout(() => {
                if(pantallaBloqueada) actualizarUI_bloqueo();
                else {
                    infoDiv.innerHTML = '⚡ SYSTEM VHS ][  Ms.BananaS interface ⚡<br>▶ Estado: <span id="lockStateLabel">🟢 DESBLOQUEADO · Sistema OK</span>';
                }
            }, 1800);
        }
        // también limpiar cualquier diálogo pendiente
        limpiarDialogo();
    }

    // Mostrar el diálogo de confirmación cuando se pulsa Ms.BananaS.
    function mostrarConfirmacion() {
        // Limpiar cualquier diálogo previo
        limpiarDialogo();
        // Crear estructura del diálogo
        const dialogDiv = document.createElement('div');
        dialogDiv.className = 'confirm-dialog';
        dialogDiv.innerHTML = `
            <div class="dialog-text">
                ⚠️ Are you sure you want to restart (Opción)? ⚠️<br>
                Se enviará señal HTTP a Ms.BananaS.<br>
                <span style="font-size:0.9rem;">(Se quitará Pantalla Bloqueo si está activa)</span>
            </div>
            <div class="dialog-buttons">
                <button class="small-btn" id="confirmYesBtn">🟢 SÍ, reiniciar</button>
                <button class="small-btn" id="confirmNoBtn">🔴 NO, cancelar</button>
            </div>
        `;
        confirmContainer.appendChild(dialogDiv);

        // event listeners
        const yesBtn = document.getElementById('confirmYesBtn');
        const noBtn = document.getElementById('confirmNoBtn');
        if (yesBtn) {
            yesBtn.addEventListener('click', () => {
                // El usuario confirmó SÍ.
                enviarHttpYQuitarBloqueo();
                // adicional, limpiar diálogo
                limpiarDialogo();
            });
        }
        if (noBtn) {
            noBtn.addEventListener('click', () => {
                // cancelar: solo cierra diálogo y muestra mensaje
                limpiarDialogo();
                const zone = document.getElementById('infoZone');
                if (zone) {
                    const prevHtml = zone.innerHTML;
                    zone.innerHTML = '⛔ Reinicio cancelado. Sin cambios.';
                    setTimeout(() => {
                        if (pantallaBloqueada) actualizarUI_bloqueo();
                        else if (zone && !pantallaBloqueada) {
                            zone.innerHTML = '⚡ SYSTEM VHS ][  Ms.BananaS interface ⚡<br>▶ Estado: <span id="lockStateLabel">🟢 DESBLOQUEADO · Sistema OK</span>';
                        } else if(pantallaBloqueada) actualizarUI_bloqueo();
                    }, 1200);
                }
            });
        }
    }

    // BOTÓN PRINCIPAL Ms.BananaS lanza confirmación
    mainBtn.addEventListener('click', () => {
        mostrarConfirmacion();
    });

    // ------------------------ SIMULADOR DE PANTALLA BLOQUEO (para demostrar que se quite) -----------------
    // Crear un pequeño botón no intrusivo para activar el bloqueo de pantalla y mostrar la funcionalidad 
    // tal como el enunciado sugiere "que pueda quitar pantalla bloqueo" necesitamos un estado bloqueado. 
    // Añadimos un botón adicional pero con estilo secundario y pequeño dentro del lock-message? 
    // Para mantener la pureza, podemos añadirlo debajo del footer o en la zona de mensaje pero sin romper diseño.
    // Creamos un botón elegante, estilo terminal, texto "🔒 SIMULAR BLOQUEO" que pondrá pantalla_bloqueada = true.
    // Esto cumple con que el usuario pueda probar que al presionar Ms.BananaS -> SÍ se envíe HTTP y quite el bloqueo.
    // Se hace de forma consistente y permite validar cada requisito.
    const extraDiv = document.createElement('div');
    extraDiv.style.marginTop = '15px';
    extraDiv.style.textAlign = 'center';
    extraDiv.style.borderTop = '1px dotted #0f0';
    extraDiv.style.paddingTop = '12px';
    extraDiv.innerHTML = `
        <button id="simulateLockBtn" style="background:transparent; border:1px solid #0f0; color:#0f0; font-family:monospace; padding:6px 12px; font-size:0.8rem; cursor:pointer; letter-spacing:1px;">
            ⚡ SIMULAR Pantalla Bloqueo (Demo) ⚡
        </button>
        <span style="margin-left:10px; font-size:0.7rem;">│ Activar bloqueo para probar "quitar"</span>
    `;
    document.querySelector('.vhs-container').appendChild(extraDiv);
    
    const simulateBtn = document.getElementById('simulateLockBtn');
    if (simulateBtn) {
        simulateBtn.addEventListener('click', () => {
            if (!pantallaBloqueada) {
                pantallaBloqueada = true;
                actualizarUI_bloqueo();
                // mostrar en confirmación
                limpiarDialogo();
                const infoDiv2 = document.getElementById('infoZone');
                if(infoDiv2) infoDiv2.innerHTML = '⚡ SYSTEM VHS ][ BLOQUEO ACTIVADO ⚡<br>▶ Estado: <span id="lockStateLabel">🔒 BLOQUEADO · Pantalla Bloqueo activa</span><br><span style="font-size:0.8rem;">Usa "Ms.BananaS." y confirma SÍ para quitar bloqueo.</span>';
                const lockMsg = document.getElementById('lockMessageDisplay');
                if(lockMsg) lockMsg.innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning blink">BLOQUEADO</span>';
            } else {
                // Ya bloqueado, mensaje de aviso
                const tempMsg = document.getElementById('lockMessageDisplay');
                if(tempMsg) {
                    tempMsg.innerHTML = '⚠️ YA ESTÁ BLOQUEADA LA PANTALLA. Usa Ms.BananaS → SÍ para desbloquear.';
                    setTimeout(() => {
                        if(document.getElementById('lockMessageDisplay') && pantallaBloqueada)
                            document.getElementById('lockMessageDisplay').innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning blink">BLOQUEADO</span>';
                        else if (!pantallaBloqueada && document.getElementById('lockMessageDisplay'))
                            document.getElementById('lockMessageDisplay').innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning">DESBLOQUEADO</span>';
                    }, 1800);
                }
            }
        });
    }

    // Inicializar la UI correctamente (sin bloqueo por defecto)
    pantallaBloqueada = false;
    actualizarUI_bloqueo();

    // Sincronizar la referencia de blockScreenIndicator luego de cambios eventuales
    window.addEventListener('load', () => {
        actualizarUI_bloqueo();
        // agregar efecto de cinta extra
    });
</script>
</body>
</html>
