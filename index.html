<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VHS MONITOR - Ms.BananaS Resurrection</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #0a0f0a 0%, #030603 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        .vhs-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.25;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.08) 0px, rgba(0, 255, 0, 0.08) 2px, transparent 2px, transparent 6px);
            animation: vhs-scan 8s linear infinite;
        }

        @keyframes vhs-scan {
            0% { transform: translateY(0); opacity: 0.2; }
            50% { transform: translateY(4px); opacity: 0.35; }
            100% { transform: translateY(0); opacity: 0.2; }
        }

        .vhs-glitch {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 20, 0, 0.05);
            pointer-events: none;
            z-index: 11;
            mix-blend-mode: overlay;
            animation: vhs-noise 0.3s infinite;
        }

        @keyframes vhs-noise {
            0% { opacity: 0.1; background: radial-gradient(circle at 20% 40%, rgba(0,255,0,0.1) 2%, transparent 3%);}
            33% { opacity: 0.2; background: radial-gradient(circle at 80% 70%, rgba(0,255,0,0.15) 1%, transparent 4%);}
            66% { opacity: 0.05; background: radial-gradient(circle at 40% 20%, rgba(0,255,0,0.2) 3%, transparent 5%);}
            100% { opacity: 0.12; background: radial-gradient(circle at 90% 85%, rgba(0,255,0,0.1) 2%, transparent 3%);}
        }

        .vhs-container {
            background-color: #000000dd;
            border: 4px solid #0f0;
            box-shadow: 0 0 20px #0f0, inset 0 0 15px #0f0;
            backdrop-filter: blur(1px);
            padding: 2rem;
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            position: relative;
            z-index: 20;
        }

        .vhs-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
            border-radius: 12px;
            pointer-events: none;
        }

        .reset-title {
            text-align: center;
            font-size: 4rem;
            letter-spacing: 6px;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            margin-bottom: 1.5rem;
            animation: flicker 3s infinite;
            text-transform: uppercase;
        }

        @keyframes flicker {
            0%, 100% { text-shadow: 0 0 5px #0f0; opacity: 1; }
            10% { text-shadow: 0 0 15px #0f0; opacity: 0.9; }
            20% { text-shadow: 0 0 2px #0f0; opacity: 0.85; }
            50% { text-shadow: 0 0 8px #0f0; opacity: 1; }
        }

        .zone-text {
            background: #031003;
            border-left: 6px solid #0f0;
            padding: 1rem;
            margin: 1.5rem 0;
            font-family: 'Share Tech Mono', monospace;
            color: #0f0;
            font-size: 1.1rem;
            text-shadow: 0 0 2px #0f0;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.2);
        }

        .vhs-button {
            background: black;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.8rem;
            padding: 0.8rem 1.8rem;
            cursor: pointer;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 6px #0f0;
            font-weight: bold;
        }

        .vhs-button:hover {
            background: #0f0;
            color: black;
            transform: scale(0.98);
        }

        .confirm-dialog {
            background: #021002;
            border: 2px solid #0f0;
            padding: 1.5rem;
            margin-top: 1.8rem;
            text-align: center;
        }

        .dialog-text {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #0f0;
        }

        .small-btn {
            font-size: 1.2rem;
            padding: 0.5rem 1.4rem;
            background: #021002;
            border: 1.5px solid #0f0;
            color: #0f0;
            cursor: pointer;
            margin: 0 10px;
        }

        .small-btn:hover {
            background: #0f0;
            color: black;
        }

        .lock-message {
            margin-top: 20px;
            font-size: 0.9rem;
            text-align: center;
            padding: 6px;
            border-top: 1px dashed #0f0;
        }

        .blink {
            animation: blink-anim 1s step-end infinite;
        }

        @keyframes blink-anim {
            50% { opacity: 0.3; }
        }

        .warning {
            color: #0f0;
            background: #030f03;
            padding: 0 8px;
        }

        .status-dead {
            color: #ff4444;
            text-shadow: 0 0 4px red;
            font-weight: bold;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 22px;
            opacity: 0.7;
            color: #0f0;
        }
        .small-demo-btn {
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 4px 12px;
            font-family: monospace;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="vhs-overlay"></div>
<div class="vhs-glitch"></div>

<div class="vhs-container">
    <div class="reset-title">Reset</div>

    <div class="zone-text" id="infoZone">
        ⚡ SYSTEM VHS [MONITOR DE RESURRECCIÓN] ⚡<br>
        ▶ Estado del Juego: <span id="gameStatusLabel">🟢 SIN BLOQUEO / OK</span><br>
        ▶ Monitor Activo: <span id="monitorStatus">ESCUCHANDO SEÑAL...</span>
    </div>

    <div style="text-align: center;">
        <button class="vhs-button" id="mainBananaBtn">Ms.BananaS.</button>
    </div>

    <div id="confirmDialogContainer" style="min-height: 170px;"></div>

    <div class="lock-message" id="lockMessageDisplay">
        📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning blink">DESBLOQUEADO</span>
    </div>
    <footer>VCR OSD // DETECCIÓN AUTOMÁTICA DE MUERTE // RESET NECESARIO</footer>
    <div style="text-align:center; margin-top:12px;">
        <button id="forceKillBtn" class="small-demo-btn">💀 SIMULAR QUE MATARON A Ms.BananaS (demo)</button>
    </div>
</div>

<script>
    // === ESTADOS REALES ===
    let pantallaBloqueada = false;      // Bloqueo interno: necesita reinicio
    let gameOverDetected = false;       // Flag para saber si el juego fue matado
    let monitorInterval = null;          // Intervalo de monitoreo
    const RESET_URL = 'https://raphapro900.github.io/Ms.BananaS/';

    // Elementos DOM
    const gameStatusLabel = document.getElementById('gameStatusLabel');
    const monitorStatusSpan = document.getElementById('monitorStatus');
    const lockStateSpan = document.getElementById('blockScreenIndicator');
    const confirmContainer = document.getElementById('confirmDialogContainer');
    const mainBtn = document.getElementById('mainBananaBtn');
    const lockMsgDiv = document.getElementById('lockMessageDisplay');

    // === FUNCIÓN PARA ACTUALIZAR UI SEGÚN BLOQUEO ===
    function actualizarUI() {
        const infoZoneDiv = document.getElementById('infoZone');
        if (pantallaBloqueada) {
            lockStateSpan.innerHTML = 'BLOQUEADO 🔒';
            lockStateSpan.style.animation = 'blink-anim 1s step-end infinite';
            gameStatusLabel.innerHTML = '🔴 BLOQUEADO · NECESITA REINICIO 🔴';
            gameStatusLabel.classList.add('status-dead');
            if (infoZoneDiv && !infoZoneDiv.innerHTML.includes("REQUIERE REINICIO")) {
                infoZoneDiv.innerHTML = '⚠️ SYSTEM VHS [ALERTA] ⚠️<br>▶ Estado del Juego: <span id="gameStatusLabel">🔴 BLOQUEADO · NECESITA REINICIO 🔴</span><br>▶ Ms.BananaS ha sido derrotada. Presiona "Ms.BananaS." y confirma REINICIO.';
            }
        } else {
            lockStateSpan.innerHTML = 'DESBLOQUEADO';
            lockStateSpan.style.animation = 'none';
            gameStatusLabel.innerHTML = '🟢 ACTIVO · SIN BLOQUEO 🟢';
            gameStatusLabel.classList.remove('status-dead');
            if (infoZoneDiv && !infoZoneDiv.innerHTML.includes("SIN BLOQUEO")) {
                infoZoneDiv.innerHTML = '⚡ SYSTEM VHS [MONITOR DE RESURRECCIÓN] ⚡<br>▶ Estado del Juego: <span id="gameStatusLabel">🟢 ACTIVO · SIN BLOQUEO 🟢</span><br>▶ Monitor Activo: <span id="monitorStatus">ESCUCHANDO SEÑAL...</span>';
            }
        }
        // Aseguramos que el span de estado dentro del texto dinámico también se actualice si fue reescrito
        const dynamicGameLabel = document.getElementById('gameStatusLabel');
        if (dynamicGameLabel) {
            if (pantallaBloqueada) dynamicGameLabel.innerHTML = '🔴 BLOQUEADO · NECESITA REINICIO 🔴';
            else dynamicGameLabel.innerHTML = '🟢 ACTIVO · SIN BLOQUEO 🟢';
        }
    }

    // === DETECTAR SI EL JUEGO ESTÁ "MUERTO/BLOQUEADO" BASADO EN EL CONTENIDO REAL DE LA URL ===
    // El HTML real contiene: "GAME NOT FOUND", "bloqueado", "Esperando señal de reseteo"
    function analizarEstadoJuego(htmlTexto) {
        const lowerContent = htmlTexto.toLowerCase();
        if (lowerContent.includes('game not found') || 
            lowerContent.includes('bloqueado') || 
            lowerContent.includes('esperando señal de reseteo') ||
            lowerContent.includes('reset') && lowerContent.includes('señal')) {
            return true; // Game over / bloqueado
        }
        return false;
    }

    // === MONITOREO PERIÓDICO DEL ESTADO DE https://raphapro900.github.io/Ms.BananaS/ ===
    function iniciarMonitoreo() {
        if (monitorInterval) clearInterval(monitorInterval);
        
        monitorInterval = setInterval(() => {
            // Solo monitoreamos si el juego está "desbloqueado" en nuestro sistema o si queremos detectar cuando lo matan.
            // Pero el flujo correcto: después de reiniciar, empezamos a escuchar si el juego vuelve a caer.
            // Incluso si pantallaBloqueada = true, podemos monitorear para detectar si alguien lo reseteó externamente? Pero mejor solo cuando está desbloqueado.
            // Para cumplir con "cuando detecte que en Ms.BananaS lo mataron que se ponga como si necesita otravez reiniciar"
            fetch(RESET_URL, {
                method: 'GET',
                cache: 'no-store',
                headers: { 'Cache-Control': 'no-cache' }
            })
            .then(response => response.text())
            .then(html => {
                const juegoBloqueado = analizarEstadoJuego(html);
                monitorStatusSpan.innerHTML = `🔄 Última revisión: ${new Date().toLocaleTimeString()} | Estado remoto: ${juegoBloqueado ? 'BLOQUEADO/MUERTO' : 'ACTIVO'}`;
                
                // Si el juego remoto está bloqueado/muerto Y nuestro sistema actual NO está bloqueado (pantallaBloqueada = false)
                // -> significa que acaban de matarlo, debemos activar automáticamente el "necesita reinicio"
                if (juegoBloqueado && !pantallaBloqueada) {
                    console.log("⚠️ ¡DETECTADO! Ms.BananaS fue derrotado/encontrado bloqueado. Activando necesidad de reinicio.");
                    pantallaBloqueada = true;
                    actualizarUI();
                    if (lockMsgDiv) {
                        lockMsgDiv.innerHTML = '💀 [ALERTA VHS] 💀 ¡HAN MATADO A Ms.BananaS! REQUIERE REINICIO. Presione el botón.';
                        setTimeout(() => {
                            if (lockMsgDiv) lockMsgDiv.innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning blink">BLOQUEADO</span>';
                        }, 3000);
                    }
                    // Opcional: limpiar diálogos para evitar confusiones
                    limpiarDialogo();
                } 
                // Si el juego remoto está ACTIVO y nuestro sistema está bloqueado, podría significar que alguien lo desbloqueó externamente? 
                // Pero mantenemos la lógica: solo se desbloquea mediante el botón de reinicio. No lo cambiamos automáticamente.
                else if (!juegoBloqueado && pantallaBloqueada) {
                    // Mostramos mensaje de que el juego fue reseteado externamente, pero mantenemos bloqueo hasta que usuario haga clic?
                    // No, mejor no cambiar estado para evitar ciclos raros. El usuario debe usar el botón.
                    monitorStatusSpan.innerHTML += " | (Juego activo externamente, pero sistema espera confirmación)";
                }
            })
            .catch(error => {
                console.warn("Error en monitoreo:", error);
                monitorStatusSpan.innerHTML = `⚠️ ERROR conectando a ${RESET_URL}. Reintentando...`;
            });
        }, 4000); // cada 4 segundos
    }

    // === FUNCIÓN DE REINICIO (envía HTTP real y DESBLOQUEA el sistema) ===
    function enviarReseteoYDesbloquear() {
        // Enviar señal HTTP real
        fetch(RESET_URL, { method: 'GET', cache: 'no-cache', mode: 'cors' })
            .then(res => {
                console.log("HTTP Reset enviado. Status:", res.status);
                monitorStatusSpan.innerHTML = `✅ SEÑAL DE RESET ENVIADA (${res.status}) a ${RESET_URL}`;
            })
            .catch(err => {
                console.warn("Error en fetch, pero señal enviada en modo no-cors:", err);
                monitorStatusSpan.innerHTML = `⚠️ Señal de reset emitida (CORS bloqueado pero intentado).`;
            });

        // Desbloquear nuestro sistema SI estaba bloqueado
        if (pantallaBloqueada) {
            pantallaBloqueada = false;
            actualizarUI();
            if (lockMsgDiv) {
                lockMsgDiv.innerHTML = '🔄 REINICIO EFECTUADO. Superficie desbloqueada. Esperando nuevo Game Over...';
                setTimeout(() => {
                    if (lockMsgDiv && !pantallaBloqueada) lockMsgDiv.innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning">DESBLOQUEADO</span>';
                }, 2500);
            }
        } else {
            // Reinicio preventivo aunque no estuviera bloqueado
            if (lockMsgDiv) lockMsgDiv.innerHTML = '🟢 Reset enviado. Monitoreando posible muerte...';
            setTimeout(() => {
                if (lockMsgDiv && !pantallaBloqueada) lockMsgDiv.innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning">DESBLOQUEADO</span>';
            }, 2000);
        }
        limpiarDialogo();
    }

    // === DIÁLOGO DE CONFIRMACIÓN ===
    function limpiarDialogo() {
        confirmContainer.innerHTML = '';
    }

    function mostrarConfirmacion() {
        limpiarDialogo();
        const dialogDiv = document.createElement('div');
        dialogDiv.className = 'confirm-dialog';
        dialogDiv.innerHTML = `
            <div class="dialog-text">
                ⚠️ Are you sure you want to restart Ms.BananaS? ⚠️<br>
                Se enviará señal de RESETEO REAL al juego.<br>
                <span style="font-size:0.85rem;">(Esto quitará Pantalla Bloqueo y reactivará el monitoreo de muerte)</span>
            </div>
            <div class="dialog-buttons">
                <button class="small-btn" id="confirmYesBtn">🟢 SÍ, reiniciar ahora</button>
                <button class="small-btn" id="confirmNoBtn">🔴 NO, cancelar</button>
            </div>
        `;
        confirmContainer.appendChild(dialogDiv);
        
        document.getElementById('confirmYesBtn')?.addEventListener('click', () => {
            enviarReseteoYDesbloquear();
        });
        document.getElementById('confirmNoBtn')?.addEventListener('click', () => {
            limpiarDialogo();
            const zone = document.getElementById('infoZone');
            if(zone) zone.innerHTML = '⛔ Reinicio cancelado. El juego sigue en su estado actual.';
            setTimeout(() => actualizarUI(), 1500);
        });
    }

    // === EVENTO PRINCIPAL ===
    mainBtn.addEventListener('click', () => {
        mostrarConfirmacion();
    });

    // === SIMULADOR DE "MATARON A Ms.BananaS" PARA DEMO Y PRUEBA (sin esperar al servidor real, útil para test del ciclo) ===
    // Esto fuerza la detección de muerte simulando que el juego fue bloqueado, para ver el comportamiento "necesita otravez reiniciar"
    function simularMuerte() {
        if (!pantallaBloqueada) {
            pantallaBloqueada = true;
            actualizarUI();
            if (lockMsgDiv) {
                lockMsgDiv.innerHTML = '💀 SIMULACIÓN: HAN MATADO A Ms.BANANAS. Sistema requiere REINICIO. 💀';
                setTimeout(() => {
                    if (lockMsgDiv && pantallaBloqueada) lockMsgDiv.innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning blink">BLOQUEADO</span>';
                }, 3500);
            }
            limpiarDialogo();
            monitorStatusSpan.innerHTML = "⚠️ [DEMO] Muerte forzada detectada. Presiona Ms.BananaS y reinicia.";
        } else {
            if (lockMsgDiv) lockMsgDiv.innerHTML = '⚠️ Ya está bloqueado. Usa Ms.BananaS para reiniciar.';
            setTimeout(() => {
                if (lockMsgDiv && pantallaBloqueada) lockMsgDiv.innerHTML = '📼 [ SISTEMA ] Pantalla Bloqueo: <span id="blockScreenIndicator" class="warning blink">BLOQUEADO</span>';
            }, 2000);
        }
    }

    const forceKill = document.getElementById('forceKillBtn');
    if (forceKill) forceKill.addEventListener('click', simularMuerte);

    // === INICIAR TODO ===
    pantallaBloqueada = false;
    actualizarUI();
    iniciarMonitoreo();
</script>
</body>
</html>
